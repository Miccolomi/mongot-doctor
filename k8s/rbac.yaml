apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongot-doctor
  namespace: mongodb       # change to your namespace
  labels:
    app: mongot-doctor

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mongot-doctor
  labels:
    app: mongot-doctor
rules:
  # Pod discovery, log streaming, Prometheus scraping (direct + API proxy fallback)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/proxy"]
    verbs: ["get", "list", "watch"]

  # Services, PVCs, Events, Namespaces
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "events", "namespaces"]
    verbs: ["get", "list"]

  # Helm release discovery (secrets labelled owner=helm)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list"]

  # MCK Operator discovery
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]

  # MongoDBSearch CRD
  - apiGroups: ["mongodb.com"]
    resources: ["mongodbsearch"]
    verbs: ["get", "list", "watch"]

  # Metrics Server (CPU / memory live)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mongot-doctor
  labels:
    app: mongot-doctor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mongot-doctor
subjects:
  - kind: ServiceAccount
    name: mongot-doctor
    namespace: mongodb     # must match ServiceAccount namespace above
