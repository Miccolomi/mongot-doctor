# Optional: Prometheus Operator ServiceMonitor
# Apply this only if you have the Prometheus Operator installed in your cluster.
# It exposes mongot-doctor as a standard Prometheus scrape target.
#
# Check if Prometheus Operator is installed:
#   kubectl get crd servicemonitors.monitoring.coreos.com
#
# Apply with:
#   kubectl apply -f k8s/service-monitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mongot-doctor
  namespace: mongodb       # change to your namespace
  labels:
    app: mongot-doctor
spec:
  selector:
    matchLabels:
      app: mongot-doctor
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
