apiVersion: v1
kind: Service
metadata:
  name: mongot-doctor
  namespace: mongodb       # change to your namespace
  labels:
    app: mongot-doctor
spec:
  type: NodePort
  selector:
    app: mongot-doctor
  ports:
    - name: http
      port: 5050
      targetPort: 5050
      # nodePort: 30050   # uncomment to pin a specific NodePort (30000-32767)
